name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust (stable x64 MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: aarch64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── .NET ─────────────────────────────────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      # ── Build x64: all layers + run all tests ─────────────────────────────────
      - name: Build x64 (all layers + tests)
        run: .\build.ps1 -Profile release -Arch x64

      # ── WinRT x64 projection tests ───────────────────────────────────────────
      - name: Run WinRT projection tests (x64)
        run: |
          dotnet test tests/winrt/AutomergeWinRTTests.csproj `
            -p:Platform=x64 -p:RuntimeIdentifier=win-x64 `
            --logger "console;verbosity=normal"

      # ── Build ARM64: cross-compile all layers (no test execution on x64 host) ─
      - name: Build ARM64 (cross-compile, no test execution)
        run: .\build.ps1 -Profile release -Arch arm64

      # ── Upload built artifacts for inspection / downstream use ───────────────
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ github.sha }}
          retention-days: 7
          path: |
            rust-core/target/release/automerge_core.dll
            rust-core/target/release/automerge_core.dll.lib
            rust-core/target/aarch64-pc-windows-msvc/release/automerge_core.dll
            rust-core/target/aarch64-pc-windows-msvc/release/automerge_core.dll.lib
            build/automerge_wrapper.lib
            build-arm64/automerge_wrapper.lib
            build-winrt/release/Automerge.Windows.dll
            build-winrt/release/Automerge.Windows.winmd
            build-winrt-arm64/release/Automerge.Windows.dll
            build-winrt-arm64/release/Automerge.Windows.winmd
